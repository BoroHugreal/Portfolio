name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois ; on n'annule pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Empaqueter le site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
